<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administración - Club Sportivo Iglesia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full">
        <div class="text-center mb-6">
            <div class="bg-blue-800 text-white p-4 rounded-full w-20 h-20 flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-shield-alt text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Acceso Administradores</h2>
            <p class="text-gray-600 mt-2">Ingrese sus credenciales para continuar</p>
        </div>
        
        <form id="loginForm" onsubmit="return false;">
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">
                    <i class="fas fa-user"></i> Usuario
                </label>
                <input type="text" id="username" required 
                       class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500"
                       placeholder="admin">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 font-semibold mb-2">
                    <i class="fas fa-lock"></i> Contraseña
                </label>
                <input type="password" id="password" required 
                       class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500"
                       placeholder="••••••••">
            </div>
            <button type="submit" onclick="verificarLogin()" 
                    class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 font-semibold transition">
                <i class="fas fa-sign-in-alt"></i> Ingresar al Panel
            </button>
        </form>
        
        <div id="errorMsg" class="mt-4 text-center text-red-600 text-sm hidden"></div>
        
        <div class="mt-6 text-center text-sm text-gray-500">
            <a href="index.html" class="text-blue-600 hover:underline">
                <i class="fas fa-arrow-left"></i> Volver al inicio
            </a>
        </div>
        
        <div class="mt-4 pt-4 border-t text-center text-xs text-gray-400">
            <i class="fas fa-lock"></i> Área restringida - Solo personal autorizado
        </div>
    </div>

    <script>
        // ⚠️ CAMBIÁ ESTAS CREDENCIALES POR LAS QUE QUIERAS USAR ⚠️
        const ADMIN_USER = 'admin';
        const ADMIN_PASS = 'ClubIglesia2024';
        
        function verificarLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (username === ADMIN_USER && password === ADMIN_PASS) {
                // Guardar sesión
                sessionStorage.setItem('adminAuthenticated', 'true');
                sessionStorage.setItem('adminUser', username);
                sessionStorage.setItem('adminLoginTime', new Date().getTime());
                // Redirigir al panel
                window.location.href = 'admin_panel.html';
            } else {
                errorMsg.textContent = '❌ Usuario o contraseña incorrectos';
                errorMsg.classList.remove('hidden');
                setTimeout(() => {
                    errorMsg.classList.add('hidden');
                }, 3000);
            }
        }
        
        // Prevenir que el formulario se envíe con Enter
        document.getElementById('loginForm').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verificarLogin();
            }
        });
    </script>
</body>
</html>
