<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Sportivo Iglesia - Sistema de Socios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-gray-100 min-h-screen">
    <div class="max-w-4xl mx-auto p-6 text-center">
        <div class="bg-white rounded-2xl shadow-xl p-8 mt-20">
            <div class="bg-blue-800 text-white p-6 rounded-full w-28 h-28 flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-futbol text-5xl"></i>
            </div>
            
            <h1 class="text-4xl font-bold text-blue-800 mb-2">Club Sportivo Iglesia</h1>
            <p class="text-gray-600 mb-8">Sistema integral de gestión de socios</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <a href="socio_simple.html" class="block p-6 bg-blue-50 rounded-xl hover:bg-blue-100 transition border-2 border-blue-200">
                    <i class="fas fa-user text-4xl text-blue-600 mb-3"></i>
                    <h2 class="text-xl font-bold text-gray-800">Área de Socios</h2>
                    <p class="text-gray-600 text-sm mt-2">Consulta tu estado de cuenta y novedades</p>
                </a>
                
                <a href="login_admin.html" class="block p-6 bg-gray-50 rounded-xl hover:bg-gray-100 transition border-2 border-gray-200">
                    <i class="fas fa-shield-alt text-4xl text-gray-600 mb-3"></i>
                    <h2 class="text-xl font-bold text-gray-800">Administración</h2>
                    <p class="text-gray-600 text-sm mt-2">Acceso restringido para administradores</p>
                    <p class="text-xs text-gray-400 mt-2"><i class="fas fa-lock"></i> Requiere autenticación</p>
                </a>
            </div>
            
            <div class="mt-8 pt-6 border-t border-gray-200">
                <p class="text-sm text-gray-500">
                    <i class="fas fa-database"></i> Datos conectados a Google Sheets
                </p>
            </div>
        </div>
    </div>
</body>
</html>
