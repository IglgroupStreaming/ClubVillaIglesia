<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Sportivo Iglesia - Socios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-800 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex items-center space-x-2">
                <i class="fas fa-futbol text-2xl"></i>
                <span class="font-bold text-xl">Club Sportivo Iglesia</span>
                <span class="text-sm ml-4 bg-green-500 px-2 py-1 rounded">Modo Prueba - Sin Login</span>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
        <!-- Estado de conexión -->
        <div id="statusCard" class="bg-white rounded-lg shadow-lg p-4 mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <i class="fas fa-circle text-xs" id="statusIcon"></i>
                    <span id="statusText" class="ml-2">Verificando conexión...</span>
                </div>
                <button onclick="recargarDatos()" class="bg-blue-600 text-white px-3 py-1 rounded text-sm">
                    <i class="fas fa-sync-alt"></i> Recargar
                </button>
            </div>
        </div>

        <!-- Lista de socios -->
        <div class="bg-white rounded-lg shadow-lg overflow-hidden">
            <div class="bg-gradient-to-r from-blue-600 to-blue-700 p-4">
                <h2 class="text-white font-bold text-xl">
                    <i class="fas fa-users"></i> Lista de Socios Registrados
                </h2>
                <p class="text-blue-100 text-sm mt-1">Datos conectados a Google Sheets</p>
            </div>
            <div id="loadingMsg" class="text-center py-8">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
                <p class="mt-2">Cargando datos desde Google Sheets...</p>
            </div>
            <div class="overflow-x-auto hidden" id="tablaContainer">
                <table class="w-full">
                    <thead class="bg-gray-200">
                        <tr>
                            <th class="p-3 text-left">ID</th>
                            <th class="p-3 text-left">Nombre</th>
                            <th class="p-3 text-left">Email</th>
                            <th class="p-3 text-left">Teléfono</th>
                            <th class="p-3 text-left">Fecha Registro</th>
                            <th class="p-3 text-left">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="listaSocios"></tbody>
                </table>
            </div>
            <div id="emptyMsg" class="text-center text-gray-500 py-8 hidden">
                <i class="fas fa-inbox text-4xl mb-2"></i>
                <p>No hay socios registrados en Google Sheets</p>
                <button onclick="agregarSocioDemo()" class="mt-3 bg-blue-600 text-white px-4 py-2 rounded text-sm">
                    <i class="fas fa-plus"></i> Agregar socio de demostración
                </button>
            </div>
        </div>

        <!-- Formulario rápido para agregar socio -->
        <div class="bg-white rounded-lg shadow-lg p-6 mt-6">
            <h3 class="font-bold text-gray-800 mb-4">
                <i class="fas fa-user-plus text-blue-600"></i> Agregar nuevo socio
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="nombre" placeholder="Nombre completo" class="border p-2 rounded">
                <input type="email" id="email" placeholder="Email" class="border p-2 rounded">
                <input type="text" id="telefono" placeholder="Teléfono" class="border p-2 rounded">
            </div>
            <button onclick="agregarSocio()" class="mt-4 bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">
                <i class="fas fa-save"></i> Guardar en Google Sheets
            </button>
            <div id="formResult" class="mt-3 text-sm"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbywqVvCGj6PMKsmqUItytEHSr_tC6nlLnSPMHlLIK1J-2hX2FuW2EpYXdAZgT8xP5JV/exec';
        let socios = [];
        
        async function cargarSocios() {
            const loading = document.getElementById('loadingMsg');
            const tabla = document.getElementById('tablaContainer');
            const emptyMsg = document.getElementById('emptyMsg');
            const statusText = document.getElementById('statusText');
            const statusIcon = document.getElementById('statusIcon');
            
            loading.classList.remove('hidden');
            tabla.classList.add('hidden');
            emptyMsg.classList.add('hidden');
            
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getData&t=${Date.now()}`);
                const text = await response.text();
                const data = JSON.parse(text);
                
                if (data.success && data.data) {
                    socios = data.data;
                    
                    if (socios.length === 0) {
                        emptyMsg.classList.remove('hidden');
                        statusText.innerHTML = '✅ Conectado a Google Sheets - Sin datos';
                        statusIcon.className = 'fas fa-circle text-xs text-green-500';
                    } else {
                        renderizarSocios();
                        tabla.classList.remove('hidden');
                        statusText.innerHTML = `✅ Conectado a Google Sheets - ${socios.length} socios`;
                        statusIcon.className = 'fas fa-circle text-xs text-green-500';
                    }
                } else {
                    throw new Error('No se pudieron cargar los datos');
                }
                
            } catch (error) {
                console.error('Error:', error);
                statusText.innerHTML = '❌ Error de conexión - Verificar Google Apps Script';
                statusIcon.className = 'fas fa-circle text-xs text-red-500';
                emptyMsg.innerHTML = `
                    <i class="fas fa-exclamation-triangle text-4xl mb-2 text-red-500"></i>
                    <p>Error de conexión con Google Sheets</p>
                    <p class="text-sm mt-2">Verifica que la URL de Apps Script sea correcta y tenga permisos</p>
                `;
                emptyMsg.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        }
        
        function renderizarSocios() {
            const lista = document.getElementById('listaSocios');
            lista.innerHTML = '';
            
            socios.forEach((socio, index) => {
                const estadoColor = socio.estado === 'Activo' ? 'text-green-600 bg-green-50' : 
                                   socio.estado === 'Suspendido' ? 'text-yellow-600 bg-yellow-50' : 'text-red-600 bg-red-50';
                
                lista.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3">${socio.id || index + 1}</td>
                        <td class="p-3 font-medium">${escapeHtml(socio.nombre)}</td>
                        <td class="p-3">${escapeHtml(socio.email)}</td>
                        <td class="p-3">${escapeHtml(socio.telefono || '-')}</td>
                        <td class="p-3">${socio.fechaRegistro || '-'}</td>
                        <td class="p-3"><span class="px-2 py-1 rounded-full text-xs ${estadoColor}">${socio.estado || 'Activo'}</span></td>
                    </tr>
                `;
            });
        }
        
        async function agregarSocio() {
            const nombre = document.getElementById('nombre').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const formResult = document.getElementById('formResult');
            
            if (!nombre || !email) {
                formResult.innerHTML = '<span class="text-red-600">❌ Nombre y email son obligatorios</span>';
                return;
            }
            
            formResult.innerHTML = '<span class="text-blue-600">⏳ Enviando a Google Sheets...</span>';
            
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: new URLSearchParams({
                        action: 'addData',
                        nombre: nombre,
                        email: email,
                        telefono: telefono,
                        estado: 'Activo'
                    })
                });
                
                formResult.innerHTML = '<span class="text-green-600">✅ Socio agregado correctamente. Actualizando lista...</span>';
                document.getElementById('nombre').value = '';
                document.getElementById('email').value = '';
                document.getElementById('telefono').value = '';
                
                setTimeout(() => {
                    cargarSocios();
                    formResult.innerHTML = '';
                }, 1500);
                
            } catch (error) {
                formResult.innerHTML = `<span class="text-red-600">❌ Error: ${error.message}</span>`;
            }
        }
        
        async function agregarSocioDemo() {
            const formResult = document.getElementById('formResult');
            formResult.innerHTML = '<span class="text-blue-600">⏳ Agregando socio de demostración...</span>';
            
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: new URLSearchParams({
                        action: 'addData',
                        nombre: `Socio Demo ${new Date().toLocaleDateString()}`,
                        email: `demo${Date.now()}@clubiglesia.com`,
                        telefono: '2645000000',
                        estado: 'Activo'
                    })
                });
                
                formResult.innerHTML = '<span class="text-green-600">✅ Socio demo agregado. Actualizando...</span>';
                setTimeout(() => {
                    cargarSocios();
                    setTimeout(() => {
                        formResult.innerHTML = '';
                    }, 2000);
                }, 1000);
                
            } catch (error) {
                formResult.innerHTML = `<span class="text-red-600">❌ Error: ${error.message}</span>`;
            }
        }
        
        function recargarDatos() {
            cargarSocios();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
            });
        }
        
        // Cargar al inicio
        cargarSocios();
    </script>
</body>
</html>
